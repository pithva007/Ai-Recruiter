# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Claude was used for architectural guidance and code review across pipeline stages.
  Gemini API (gemini-flash-lite-latest) was used OFFLINE for two specific tasks only:
  (1) one-time JD analysis to extract structured requirements (Stage 1, run once),
  (2) reasoning generation for the top-100 candidates after ranking was complete (reason.py).
  No LLM API was used during the ranking step (rank.py). The ranking runs entirely from
  pre-computed features (features.pkl) on CPU with no network access.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based hybrid ranker over pre-computed features. Scoring has four components:
  (1) Career score: weights product-company ML experience, production retrieval/ranking systems,
  and career trajectory — with explicit disqualification penalties for pure-services careers
  (TCS/Infosys/Wipro etc.) as specified in the JD.
  (2) Skills trust score: endorsement- and duration-weighted relevance to JD requirements,
  with near-zero weight for zero-duration "keyword stuffer" skills.
  (3) Production retrieval signal: keyword-based detection of actual shipped retrieval/search/
  ranking systems in career descriptions, weighted 0.30 in final formula.
  (4) Behavioral availability multiplier: 8 redrob_signals combined multiplicatively —
  last_active_date, open_to_work_flag, recruiter_response_rate, notice_period_days,
  interview_completion_rate, location/relocation, github_activity_score, and contact verification.
  Honeypot detection: 472 candidates scored near-zero due to impossible profiles.
  Final ranking runs in under 1 second from features.pkl. Reasoning generated offline by Gemini.

