# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Kiro (AI coding assistant)"
  - "Gemini API (via google-genai SDK)"

ai_usage_summary: |
  Used Kiro (AI coding assistant) for architecture discussion, code generation,
  and iterative development across all 8 pipeline stages.
  Used Gemini API (gemini-flash-lite-latest) for:
    - JD analysis (Stage 1, runs once)
    - Evidence extraction for top-100 candidates (Stage 3)
    - Deep scoring: fit/impact/potential/risk (Stage 6)
    - Explainable ranking rationale + dark horse analysis (Stage 7)
    - Per-candidate reasoning in submission.csv (reason.py)
  No candidate data is sent to any external model during the ranking step.
  The ranking step (rank.py) makes zero network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with deterministic scoring + LLM-enriched reasoning.

  Core scoring (rank.py — CPU only, < 1s):
  - career_score (0.45): title classification + career history ML evidence +
    services company penalty (TCS/Infosys/Wipro/etc.) + product company bonus
  - skill_score (0.25): depth-weighted via proficiency × duration_months ×
    endorsements — anti-stuffer: expert skill with 0 months duration = flagged
  - behavioral_score (0.20): redrob_signals availability multiplier
    (last_active_date, open_to_work, recruiter_response_rate, interview_completion_rate)
  - fit_score (0.10): location + notice period + experience band + education tier

  Honeypot detection: 472 candidates with impossible profiles scored 0.0.

  Post-ranking (offline, LLM):
  - Evidence extraction + GraphRAG + FAISS hybrid retrieval for top-30
  - LLM deep scoring (fit/impact/potential/risk) for top-30
  - Dark horse detection: hybrid_rank > 15 AND (impact >= 75 OR potential >= 75) AND fit >= 50
  - Per-candidate reasoning in submission CSV (Gemini, factual, anti-hallucination rules)

  Runtime: rank.py ~0.3 seconds on CPU, 16 GB RAM, no network.

